<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="Calculator.css">
</head>
<body>
 
<div class="center">
  <div class="time">9:41
    <div style="margin-left: 130px;
    margin-bottom: 5px;">🛜</div>
    <div style="margin-left: 5px;
    margin-bottom: 5px;display: flex;align-items: center;gap: 2px;"><span class="icon">🪫</span>
    <span class="percent">18%</span></div>
  </div>
  <p style="font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
  font-size: 17px;
  margin-left: 45px;
  margin-top: 60px;">Calculator</p>

<div>
 <button onclick="
  UpdateCalculation('1'); 
  "class="round">1</button>

  <button onclick="
  UpdateCalculation('2');
  " class="round">2</button>
  
  <button onclick="
  UpdateCalculation('3');
  " class="round">3</button>

  <button onclick="
  UpdateCalculation('+');
  "class="round2">+</button>

</div>


<div>
  <p>
  <button onclick="
  UpdateCalculation('4');
  " class="round">4</button>

  <button onclick="
 UpdateCalculation('5'); 
  "class="round">5</button>
  
  <button onclick="
 UpdateCalculation('6');
  "class="round">6</button>

  <button onclick="
  UpdateCalculation('-');
  "class="round2">-</button>
  </p>

</div>

<div>
  <p>
  <button onclick="
  UpdateCalculation('7');
    "class="round">7</button>

  <button onclick="
  UpdateCalculation('8');
  "class="round">8</button>
  
  <button onclick="
  UpdateCalculation('9');
  "class="round">9</button>

  <button onclick="
  UpdateCalculation('*');
  "class="round2">*</button>
  </p>
</div>

<div>
  <p>
  <button onclick="
  UpdateCalculation('0');
    "class="round">0</button>

  <button onclick="
  UpdateCalculation('.');
  "class="round">.</button>
  
  <button onclick="
  calculation = eval(calculation);
  display();
  localStorage.setItem('Calculation',calculation);
  "class="round2">=</button>

  <button onclick="
  UpdateCalculation('/');
  "class="round2">/</button>
  </p>
</div>

<div>
  <p>
  <button onclick="
  calculation='';
  display();
  "class="Ac-Btn">AC</button>

    <button onclick="
      UpdateCalculation('00');
      "class="round">00</button>

  <input class="calc" onkeyup="key();">
  </p>
</div>
</div>
<script src="Calculator.js"></script>
</body>
</html>
